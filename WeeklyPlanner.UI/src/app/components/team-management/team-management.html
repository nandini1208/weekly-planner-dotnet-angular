<div class="container">

  <div class="header-text">
    👋 Welcome! Let's set up your team.
  </div>
  <div class="sub-text">
    Add the people on your team. Pick one person as the Team Lead.
  </div>

  <div class="input-card">
    <div class="input-row">
      <input type="text" [(ngModel)]="name" placeholder="Type a name here" (keyup.enter)="addMember()" />
      <button class="btn btn-add" (click)="addMember()">Add This Person</button>
    </div>
    <div *ngIf="nameError" class="error-text">
      Please type a name.
    </div>
  </div>

  <div *ngIf="members.length === 0" class="empty-card">
    No team members added yet
  </div>

  <div *ngFor="let member of members; let i = index" class="member-card">
    <span class="member-name">
      {{ member.name }}
      <span *ngIf="i === leadIndex" class="lead-badge">Team Lead</span>
    </span>

    <div class="actions">
      <button *ngIf="i !== leadIndex" class="btn btn-lead" (click)="setLead(i)">
        Make Lead
      </button>

      <button class="btn btn-remove" (click)="remove(member.id, i)">
        Remove
      </button>
    </div>
  </div>

  <button class="btn done-btn" [disabled]="members.length === 0 || leadIndex === null" (click)="goToDashboard()">
    Done — Go to Home Screen
  </button>

</div>
