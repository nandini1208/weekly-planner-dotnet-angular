<div class="card">
  <h2>👥 Manage Team Members</h2>
  <p>Add the people on your team. Pick one person as the Team Lead.</p>

  <div class="action-row" style="justify-content: flex-start; gap: 10px;">
    <input type="text" [(ngModel)]="newMemberName" placeholder="Enter member name..." style="width: auto; margin: 0;">
    
    <label style="display: flex; align-items: center; gap: 5px;">
      <input type="checkbox" [(ngModel)]="isLead" [disabled]="hasLead" style="width: auto; margin: 0;"> Set as Lead
    </label>
    
    <button (click)="addMember()" [disabled]="!newMemberName">Add Member</button>
  </div>

  <div *ngIf="teamMembers.length > 0; else noMembers">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let member of teamMembers">
          <td>{{ member.name }}</td>
          <td>
            <span *ngIf="member.isLead" style="color: var(--primary-color); font-weight: bold;">⭐ Team Lead</span>
            <span *ngIf="!member.isLead">Member</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <ng-template #noMembers>
    <p style="color: var(--error-color);">No team members added yet.</p>
  </ng-template>
</div>
