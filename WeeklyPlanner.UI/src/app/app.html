<header *ngIf="showLayout" class="top-nav">
  <div class="logo clickable" (click)="goHome()">📋 Weekly Plan Tracker</div>

  <div class="nav-actions">
    <ng-container *ngIf="currentUser">
      <span class="user-pill">{{ currentUser.name }}</span>
      <span class="lead-pill" *ngIf="currentUser.isLead">Lead</span>
      <span class="member-pill" *ngIf="!currentUser.isLead">Team Member</span>

      <button class="action-btn" (click)="switchUser()">🔄 Switch</button>
      <button class="action-btn" (click)="goHome()">🏠 Home</button>
    </ng-container>
    <button class="action-btn" (click)="toggleTheme()">{{ isDark ? '☀️ Light' : '🌙 Dark' }}</button>
  </div>
</header>

<router-outlet></router-outlet>

<footer class="bottom-bar" *ngIf="showLayout">
  <button class="footer-btn" (click)="downloadData()" [disabled]="isExporting">
    {{ isExporting ? '⏳ Exporting...' : '📥 Download My Data' }}
  </button>
  <button class="footer-btn" (click)="fileInput.click()">📂 Load Data from File</button>
  <input #fileInput type="file" accept=".json" style="display:none" (change)="loadData($event)" />
  <button class="footer-btn" (click)="openSeedModal()" [disabled]="isSeeding">
    {{ isSeeding ? '⏳ Seeding...' : '🌱 Seed Sample Data' }}
  </button>
  <button class="footer-btn danger" (click)="resetApp()">🗑 Reset App</button>
</footer>

<!-- Footer toast for feedback -->
<div class="footer-toast" *ngIf="footerToast" [class.error]="footerToastError">{{ footerToast }}</div>

<!-- Reset Modal -->
<div class="modal-overlay" *ngIf="showResetModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Reset Everything?</h3>
      <button class="close-btn" (click)="closeResetModal()">×</button>
    </div>
    <div class="modal-body">
      <p>This will erase all your data. This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" (click)="confirmReset()" [disabled]="isResetting">
        {{ isResetting ? 'Erasing...' : 'Yes, Erase Everything' }}
      </button>
      <button class="btn btn-secondary" (click)="closeResetModal()" [disabled]="isResetting">No, Go Back</button>
    </div>
  </div>
</div>

<!-- Seed Confirmation Modal -->
<div class="modal-overlay" *ngIf="showSeedModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Seed Sample Data?</h3>
      <button class="close-btn" (click)="closeSeedModal()">×</button>
    </div>
    <div class="modal-body">
      <p>This will add sample team members, backlog items, and a planning cycle. Existing data will not be erased.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-add" (click)="confirmSeed()">✅ Yes, Seed It</button>
      <button class="btn btn-secondary" (click)="closeSeedModal()">Cancel</button>
    </div>
  </div>
</div>
