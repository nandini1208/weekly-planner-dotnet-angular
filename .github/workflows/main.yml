name: Build and Deploy Weekly Planner

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore WeeklyPlannerApp.sln

      - name: Build
        run: dotnet build WeeklyPlannerApp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WeeklyPlanner.Tests/WeeklyPlanner.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish WeeklyPlanner.API/WeeklyPlanner.API.csproj -c Release -o ./publish/api

      - name: Upload API Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ./publish/api

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: WeeklyPlanner.UI
        run: npm install

      - name: Build
        working-directory: WeeklyPlanner.UI
        run: npm run build -- --configuration production

      - name: Upload UI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-app
          path: WeeklyPlanner.UI/dist/WeeklyPlanner.UI/browser

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-ui]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download API Artifact
        uses: actions/download-artifact@v4
        with:
          name: api-app
          path: ./api-app

      - name: Download UI Artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-app
          path: ./ui-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'weeklyplanner-api-3b6d2a4c'
          package: ./api-app

      - name: Deploy UI to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'weeklyplanner-ui-7d2a1b5e'
          package: ./ui-app
